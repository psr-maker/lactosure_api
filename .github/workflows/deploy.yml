name: Deploy .NET API to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish project
      run: dotnet publish ./Lactosure_api.csproj -c Release -o publish

    - name: Copy files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 168.231.121.19
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        source: "publish/*"
        target: "/var/www/lactosure_api"
        strip_components: 1

    - name: Run migrations + restart on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 168.231.121.19
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          cd /var/www/lactosure_api
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update
          systemctl restart lactosure.service